name: CPP Checker

on:
  push:
  pull_request:  # recommended: also run on PRs so thread-comments works

jobs:
  cpp-linter:
    runs-on: ubuntu-latest  # REQUIRED - was missing entirely

    steps:
      - uses: actions/checkout@v4  # v5 does not exist; latest is v4

      - name: Install dependencies
        run: |
            sudo apt-get update
            sudo apt-get install -y python3 python3-pybind11

      - name: Configure CMake
        run: cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build

      - uses: cpp-linter/cpp-linter-action@v2
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          style: 'file'
          tidy-checks: ''
          thread-comments: ${{ github.event_name == 'pull_request' && 'update' }}
          database: 'build'

      - name: Fail fast?!
        if: steps.linter.outputs.checks-failed > 0
        run: exit 1
